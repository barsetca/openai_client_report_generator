<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карточка товара — {{ product_name }}</title>
    <style>
        @page {
            size: 105mm 148mm;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'DejaVu Sans', 'Liberation Sans', Arial, sans-serif;
            width: 105mm;
            height: 148mm;
            overflow: hidden;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            box-sizing: border-box;
        }
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 14px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
            color: #fff;
            z-index: 1;
        }
        .card-name {
            font-size: 13pt;
            font-weight: 600;
            margin: 0 0 4px 0;
            line-height: 1.25;
        }
        .card-price {
            font-size: 16pt;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: #ffd700;
        }
        .card-description {
            font-size: 9pt;
            margin: 0;
            line-height: 1.3;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="card-bg" src="data:image/png;base64,{{ product_image_base64 }}" alt="" />
        <div class="card-overlay">
            <h1 class="card-name">{{ product_name }}</h1>
            <div class="card-price">{{ product_price }}</div>
            <p class="card-description">{{ product_description }}</p>
        </div>
    </div>
</body>
</html>
